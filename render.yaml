services:
  - type: web
    name: nexthire-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://your-frontend-domain.com
